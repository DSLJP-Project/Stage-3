worker_processes auto;

events { worker_connections 1024; }

http {
    upstream search_cluster {
        least_conn;
        server 10.26.14.243:7003 max_fails=1 fail_timeout=5s;
        server 10.26.14.242:7003 max_fails=1 fail_timeout=5s;
        server 10.26.14.246:7003 max_fails=1 fail_timeout=5s;
        keepalive 32;
    }

    server {
        listen 80;

        location = / { return 200 "stage3 Docker Desktop load balancer ok\n"; }

        location /search {
            proxy_pass http://search_cluster;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_connect_timeout 2s;
            proxy_read_timeout 30s;
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
        }

        location = /health {
            proxy_pass http://search_cluster/health;
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
        }

        location = /ready {
            proxy_pass http://search_cluster/ready;
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
        }
    }
}
