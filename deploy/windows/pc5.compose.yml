services:
  mongo:
    image: mongo:6
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  indexer-1:
    image: stage3/indexer:desktop
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      PORT: "7002"
      BROKER_URL: tcp://10.26.14.244:61616
      INGESTION_QUEUE: document.ingested
      INDEXED_QUEUE: book-indexed
      REINDEX_TOPIC: reindex.request
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: searchengine
      HZ_CLUSTER_NAME: search-cluster
      HZ_MEMBERS: 10.26.14.243:5701,10.26.14.242:5701,10.26.14.245:5701
      INDEXER_ID: "1"
      INDEXER_COUNT: "2"
    ports:
      - "7002:7002"

  search-3:
    image: stage3/search:desktop
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      PORT: "7003"
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: searchengine
      MONGO_COLLECTION: books
      HZ_CLUSTER_NAME: search-cluster
      HZ_MEMBERS: 10.26.14.243:5701,10.26.14.242:5701,10.26.14.245:5701
    ports:
      - "7003:7003"

  benchmarks:
    image: stage3/benchmarks:desktop
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      PORT: "7004"
      CRAWLER_URLS: http://10.26.14.243:7007,http://10.26.14.242:7007,http://10.26.14.245:7007
      INDEXING_URL: http://10.26.14.245:7002
      SEARCH_URL: http://10.26.14.244:8080
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: searchengine
      MONGO_COLLECTION: books
      HZ_CLUSTER_NAME: search-cluster
      HZ_MEMBERS: 10.26.14.243:5701,10.26.14.242:5701,10.26.14.245:5701
    ports:
      - "7004:7004"
    volumes:
      - benchmark-results:/app/results

volumes:
  mongo-data:
  benchmark-results:
