services:
  activemq:
    image: rmohr/activemq:latest
    restart: unless-stopped
    environment:
      ACTIVEMQ_ADMIN_LOGIN: admin
      ACTIVEMQ_ADMIN_PASSWORD: admin
    ports:
      - "61616:61616"
      - "8161:8161"
    volumes:
      - activemq-data:/data/activemq

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx.windows.conf:/etc/nginx/nginx.conf:ro

  control:
    image: stage3/control:desktop
    restart: unless-stopped
    depends_on:
      - activemq
      - nginx
    environment:
      PORT: "7006"
      INDEXING_URL: http://10.26.14.245:7002
      SEARCH_URL: http://nginx
      BENCHMARKS_URL: http://10.26.14.246:7004
      CRAWLER_URLS: http://10.26.14.243:7007,http://10.26.14.242:7007,http://10.26.14.245:7007
      BROKER_URL: tcp://activemq:61616
      REINDEX_TOPIC: reindex.request
    ports:
      - "7006:7006"

volumes:
  activemq-data:
