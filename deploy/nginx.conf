worker_processes auto;

events {
    worker_connections 1024;
}

http {

    upstream search_cluster {
        least_conn;
        server search-1:7003 max_fails=3 fail_timeout=30s;
        server search-2:7003 max_fails=3 fail_timeout=30s;
        server search-3:7003 max_fails=3 fail_timeout=30s;
    }

    server {
        listen 80;

        # ── Endpoint de prueba de nginx ──────────────────────────────────
        location = / {
            return 200 "nginx ok\n";
            add_header Content-Type text/plain;
        }

        # ── Search API (con barra final) ─────────────────────────────────
        location /search/ {
            proxy_pass         http://search_cluster/search/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout    30s;
        }

        # ── Search API (sin barra final) ─────────────────────────────────
        location = /search {
            proxy_pass         http://search_cluster/search;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_connect_timeout 5s;
            proxy_read_timeout    30s;
        }

        # ── Status del search-service ─────────────────────────────────────
        location = /status {
            proxy_pass         http://search_cluster/status;
            proxy_connect_timeout 5s;
            proxy_read_timeout    10s;
        }

        # ── Health check (para el load balancer mismo) ────────────────────
        location = /health {
            proxy_pass         http://search_cluster/health;
            proxy_connect_timeout 3s;
            proxy_read_timeout    5s;
        }

        # ── Ready check ───────────────────────────────────────────────────
        location = /ready {
            proxy_pass         http://search_cluster/ready;
            proxy_connect_timeout 3s;
            proxy_read_timeout    5s;
        }
    }
}