version: "3.9"

# Deploy with: docker stack deploy --resolve-image never -c deploy/stack.yml stage3
# Every PC must first build the local stage3/*:lab images with deploy/build-images.sh.

services:
  activemq:
    image: rmohr/activemq:latest
    environment:
      ACTIVEMQ_ADMIN_LOGIN: admin
      ACTIVEMQ_ADMIN_PASSWORD: admin
    volumes:
      - activemq-data:/data/activemq
    networks: [search_net]
    deploy:
      placement:
        constraints: [node.labels.stage3_pc == pc1]
      restart_policy: { condition: any }

  mongo:
    image: mongo:6
    volumes:
      - mongo-data:/data/db
    networks: [search_net]
    deploy:
      placement:
        constraints: [node.labels.stage3_pc == pc5]
      restart_policy: { condition: any }

  hazelcast-1:
    image: stage3/hazelcast:lab
    environment:
      HZ_CONFIG: /opt/hazelcast/config/hazelcast.xml
    networks: [search_net]
    deploy:
      endpoint_mode: dnsrr
      placement:
        constraints: [node.labels.stage3_pc == pc2]
      restart_policy: { condition: any }

  hazelcast-2:
    image: stage3/hazelcast:lab
    environment:
      HZ_CONFIG: /opt/hazelcast/config/hazelcast.xml
    networks: [search_net]
    deploy:
      endpoint_mode: dnsrr
      placement:
        constraints: [node.labels.stage3_pc == pc3]
      restart_policy: { condition: any }

  hazelcast-3:
    image: stage3/hazelcast:lab
    environment:
      HZ_CONFIG: /opt/hazelcast/config/hazelcast.xml
    networks: [search_net]
    deploy:
      endpoint_mode: dnsrr
      placement:
        constraints: [node.labels.stage3_pc == pc4]
      restart_policy: { condition: any }

  crawler-0:
    image: stage3/crawler:lab
    environment:
      PORT: "7007"
      CRAWLER_ID: "0"
      NUM_CRAWLERS: "3"
      DATALAKE_PATH: /data
      NODE_URL: http://crawler-0:7007
      CRAWLER_PEERS: http://crawler-1:7008,http://crawler-2:7009
      REPLICATION_FACTOR: "3"
      BROKER_URL: tcp://activemq:61616
      INGESTION_QUEUE: document.ingested
    volumes: [crawler0-data:/data]
    ports:
      - target: 7007
        published: 7007
        protocol: tcp
        mode: host
    networks: [search_net]
    deploy:
      placement:
        constraints: [node.labels.stage3_pc == pc2]
      restart_policy: { condition: any }

  crawler-1:
    image: stage3/crawler:lab
    environment:
      PORT: "7008"
      CRAWLER_ID: "1"
      NUM_CRAWLERS: "3"
      DATALAKE_PATH: /data
      NODE_URL: http://crawler-1:7008
      CRAWLER_PEERS: http://crawler-0:7007,http://crawler-2:7009
      REPLICATION_FACTOR: "3"
      BROKER_URL: tcp://activemq:61616
      INGESTION_QUEUE: document.ingested
    volumes: [crawler1-data:/data]
    ports:
      - target: 7008
        published: 7008
        protocol: tcp
        mode: host
    networks: [search_net]
    deploy:
      placement:
        constraints: [node.labels.stage3_pc == pc3]
      restart_policy: { condition: any }

  crawler-2:
    image: stage3/crawler:lab
    environment:
      PORT: "7009"
      CRAWLER_ID: "2"
      NUM_CRAWLERS: "3"
      DATALAKE_PATH: /data
      NODE_URL: http://crawler-2:7009
      CRAWLER_PEERS: http://crawler-0:7007,http://crawler-1:7008
      REPLICATION_FACTOR: "3"
      BROKER_URL: tcp://activemq:61616
      INGESTION_QUEUE: document.ingested
    volumes: [crawler2-data:/data]
    ports:
      - target: 7009
        published: 7009
        protocol: tcp
        mode: host
    networks: [search_net]
    deploy:
      placement:
        constraints: [node.labels.stage3_pc == pc4]
      restart_policy: { condition: any }

  indexer-0:
    image: stage3/indexer:lab
    environment:
      PORT: "7002"
      BROKER_URL: tcp://activemq:61616
      INGESTION_QUEUE: document.ingested
      INDEXED_QUEUE: book-indexed
      REINDEX_TOPIC: reindex.request
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: searchengine
      HZ_CLUSTER_NAME: search-cluster
      INDEXER_ID: "0"
      INDEXER_COUNT: "2"
    networks: [search_net]
    ports:
      - target: 7002
        published: 7002
        protocol: tcp
        mode: host
    deploy:
      placement:
        constraints: [node.labels.stage3_pc == pc4]
      restart_policy: { condition: any }

  indexer-1:
    image: stage3/indexer:lab
    environment:
      PORT: "7002"
      BROKER_URL: tcp://activemq:61616
      INGESTION_QUEUE: document.ingested
      INDEXED_QUEUE: book-indexed
      REINDEX_TOPIC: reindex.request
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: searchengine
      HZ_CLUSTER_NAME: search-cluster
      INDEXER_ID: "1"
      INDEXER_COUNT: "2"
    networks: [search_net]
    ports:
      - target: 7002
        published: 7002
        protocol: tcp
        mode: host
    deploy:
      placement:
        constraints: [node.labels.stage3_pc == pc5]
      restart_policy: { condition: any }

  search-1:
    image: stage3/search:lab
    environment: &search_env
      PORT: "7003"
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: searchengine
      MONGO_COLLECTION: books
      HZ_CLUSTER_NAME: search-cluster
    networks: [search_net]
    deploy:
      placement:
        constraints: [node.labels.stage3_pc == pc2]
      restart_policy: { condition: any }

  search-2:
    image: stage3/search:lab
    environment: *search_env
    networks: [search_net]
    deploy:
      placement:
        constraints: [node.labels.stage3_pc == pc3]
      restart_policy: { condition: any }

  search-3:
    image: stage3/search:lab
    environment: *search_env
    networks: [search_net]
    deploy:
      placement:
        constraints: [node.labels.stage3_pc == pc5]
      restart_policy: { condition: any }

  nginx:
    image: nginx:1.27-alpine
    configs:
      - source: nginx_swarm_conf
        target: /etc/nginx/nginx.conf
    ports:
      - target: 80
        published: 8080
        protocol: tcp
        mode: host
    networks: [search_net]
    deploy:
      placement:
        constraints: [node.labels.stage3_pc == pc1]
      restart_policy: { condition: any }

  control:
    image: stage3/control:lab
    environment:
      PORT: "7006"
      INDEXING_URL: http://indexer-0:7002
      SEARCH_URL: http://nginx
      CRAWLER_URLS: http://crawler-0:7007,http://crawler-1:7008,http://crawler-2:7009
      BROKER_URL: tcp://activemq:61616
      REINDEX_TOPIC: reindex.request
    ports:
      - target: 7006
        published: 7006
        protocol: tcp
        mode: host
    networks: [search_net]
    deploy:
      placement:
        constraints: [node.labels.stage3_pc == pc1]
      restart_policy: { condition: any }

  benchmarks:
    image: stage3/benchmarks:lab
    environment:
      PORT: "7004"
      CRAWLER_URLS: http://crawler-0:7007,http://crawler-1:7008,http://crawler-2:7009
      INDEXING_URL: http://indexer-0:7002
      SEARCH_URL: http://nginx
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: searchengine
      MONGO_COLLECTION: books
    volumes: [benchmark-results:/app/results]
    ports:
      - target: 7004
        published: 7004
        protocol: tcp
        mode: host
    networks: [search_net]
    deploy:
      placement:
        constraints: [node.labels.stage3_pc == pc5]
      restart_policy: { condition: any }

networks:
  search_net:
    driver: overlay
    attachable: true

volumes:
  activemq-data: { driver: local }
  mongo-data: { driver: local }
  crawler0-data: { driver: local }
  crawler1-data: { driver: local }
  crawler2-data: { driver: local }
  benchmark-results: { driver: local }

configs:
  nginx_swarm_conf:
    file: ./nginx.swarm.conf
