version: "3.9"

services:

  # ══════════════════════════════════════════════════════════════════════
  # INFRAESTRUCTURA BASE
  # ══════════════════════════════════════════════════════════════════════

  mongo:
    image: mongo:6
    container_name: mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - ./mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - search_net

  activemq:
    image: rmohr/activemq:latest
    container_name: activemq
    restart: always
    ports:
      - "61616:61616"
      - "8161:8161"
    environment:
      - ACTIVEMQ_ADMIN_LOGIN=admin
      - ACTIVEMQ_ADMIN_PASSWORD=admin
    healthcheck:
      test: ["CMD", "curl", "-f", "http://0.0.0.0:8161"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - search_net

  # ══════════════════════════════════════════════════════════════════════
  # HAZELCAST — Cluster de 3 nodos (índice invertido en memoria)
  # ══════════════════════════════════════════════════════════════════════

  hazelcast-1:
    build:
      context: ./hazelcast-node
    container_name: hazelcast-1
    environment:
      - HZ_CLUSTERNAME=search-cluster
    networks:
      - search_net

  hazelcast-2:
    build:
      context: ./hazelcast-node
    container_name: hazelcast-2
    environment:
      - HZ_CLUSTERNAME=search-cluster
    networks:
      - search_net

  hazelcast-3:
    build:
      context: ./hazelcast-node
    container_name: hazelcast-3
    environment:
      - HZ_CLUSTERNAME=search-cluster
    networks:
      - search_net

  # ══════════════════════════════════════════════════════════════════════
  # INGESTION SERVICE — 3 réplicas con replicación cruzada del datalake
  # ══════════════════════════════════════════════════════════════════════

  ingestion-0:
    build:
      context: ./ingestion-service
      dockerfile: Dockerfile
    container_name: ingestion-0
    environment:
      - PORT=7001
      - BROKER_URL=tcp://activemq:61616
      - INGESTION_QUEUE=document.ingested
      - DATALAKE_PATH=/app/datalake/replica-0
      - REPLICATION_FACTOR=3
      - INGESTION_PEERS=http://ingestion-1:7001,http://ingestion-2:7001
    ports:
      - "7001:7001"
    volumes:
      - ./datalake:/app/datalake
    depends_on:
      activemq:
        condition: service_healthy
    networks:
      - search_net

  ingestion-1:
    build:
      context: ./ingestion-service
      dockerfile: Dockerfile
    container_name: ingestion-1
    environment:
      - PORT=7001
      - BROKER_URL=tcp://activemq:61616
      - INGESTION_QUEUE=document.ingested
      - DATALAKE_PATH=/app/datalake/replica-1
      - REPLICATION_FACTOR=3
      - INGESTION_PEERS=http://ingestion-0:7001,http://ingestion-2:7001
    expose:
      - "7001"
    volumes:
      - ./datalake:/app/datalake
    depends_on:
      activemq:
        condition: service_healthy
    networks:
      - search_net

  ingestion-2:
    build:
      context: ./ingestion-service
      dockerfile: Dockerfile
    container_name: ingestion-2
    environment:
      - PORT=7001
      - BROKER_URL=tcp://activemq:61616
      - INGESTION_QUEUE=document.ingested
      - DATALAKE_PATH=/app/datalake/replica-2
      - REPLICATION_FACTOR=3
      - INGESTION_PEERS=http://ingestion-0:7001,http://ingestion-1:7001
    expose:
      - "7001"
    volumes:
      - ./datalake:/app/datalake
    depends_on:
      activemq:
        condition: service_healthy
    networks:
      - search_net

  # ══════════════════════════════════════════════════════════════════════
  # INDEXING SERVICE
  # ══════════════════════════════════════════════════════════════════════

  indexing-service:
    build:
      context: ./indexing-service
      dockerfile: Dockerfile
    container_name: indexing-service
    environment:
      - PORT=7002
      - BROKER_URL=tcp://activemq:61616
      - INGESTION_QUEUE=document.ingested
      - INDEXED_QUEUE=book-indexed
      - REINDEX_TOPIC=reindex.request
      - MONGO_URI=mongodb://mongo:27017
      - MONGO_DB=searchengine
      - HZ_CLUSTER_NAME=search-cluster
      - DATALAKE_PATH=/app/datalake
      - INDEXER_ID=0
      - INDEXER_COUNT=3
    ports:
      - "7002:7002"
    volumes:
      - ./datalake:/app/datalake:ro
    depends_on:
      activemq:
        condition: service_healthy
      mongo:
        condition: service_healthy
      hazelcast-1:
        condition: service_started
      hazelcast-2:
        condition: service_started
      hazelcast-3:
        condition: service_started
    networks:
      - search_net

  # ══════════════════════════════════════════════════════════════════════
  # SEARCH SERVICE — 3 instancias detrás del load balancer Nginx
  # ══════════════════════════════════════════════════════════════════════

  search-1:
    build:
      context: ./search-service
      dockerfile: Dockerfile
    container_name: search-1
    environment:
      - PORT=7003
      - MONGO_URI=mongodb://mongo:27017
      - MONGO_DB=searchengine
      - MONGO_COLLECTION=books
      - BROKER_URL=tcp://activemq:61616
      - HZ_CLUSTER_NAME=search-cluster
    expose:
      - "7003"
    depends_on:
      mongo:
        condition: service_healthy
      hazelcast-1:
        condition: service_started
      hazelcast-2:
        condition: service_started
      hazelcast-3:
        condition: service_started
      activemq:
        condition: service_healthy
    networks:
      - search_net

  search-2:
    build:
      context: ./search-service
      dockerfile: Dockerfile
    container_name: search-2
    environment:
      - PORT=7003
      - MONGO_URI=mongodb://mongo:27017
      - MONGO_DB=searchengine
      - MONGO_COLLECTION=books
      - BROKER_URL=tcp://activemq:61616
      - HZ_CLUSTER_NAME=search-cluster
    expose:
      - "7003"
    depends_on:
      mongo:
        condition: service_healthy
      hazelcast-1:
        condition: service_started
      activemq:
        condition: service_healthy
    networks:
      - search_net

  search-3:
    build:
      context: ./search-service
      dockerfile: Dockerfile
    container_name: search-3
    environment:
      - PORT=7003
      - MONGO_URI=mongodb://mongo:27017
      - MONGO_DB=searchengine
      - MONGO_COLLECTION=books
      - BROKER_URL=tcp://activemq:61616
      - HZ_CLUSTER_NAME=search-cluster
    expose:
      - "7003"
    depends_on:
      mongo:
        condition: service_healthy
      hazelcast-1:
        condition: service_started
      activemq:
        condition: service_healthy
    networks:
      - search_net

  # ══════════════════════════════════════════════════════════════════════
  # NGINX — Load Balancer (least_conn sobre search-1/2/3)
  # ══════════════════════════════════════════════════════════════════════

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "8080:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - search-1
      - search-2
      - search-3
    networks:
      - search_net

  # ══════════════════════════════════════════════════════════════════════
  # CRAWLER SERVICES — 3 crawlers distribuidos (particionado por book_id % 3)
  # ══════════════════════════════════════════════════════════════════════

  crawler-0:
    build:
      context: ./crawler-service
    container_name: crawler-0
    environment:
      - BROKER_URL=tcp://activemq:61616
      - INGESTION_QUEUE=document.ingested
      - DATALAKE_PATH=/app/datalake
      - CRAWLER_ID=0
      - NUM_CRAWLERS=3
      - PORT=7007
    ports:
      - "7007:7007"
    volumes:
      - ./datalake:/app/datalake
    depends_on:
      activemq:
        condition: service_healthy
    networks:
      - search_net

  crawler-1:
    build:
      context: ./crawler-service
    container_name: crawler-1
    environment:
      - BROKER_URL=tcp://activemq:61616
      - INGESTION_QUEUE=document.ingested
      - DATALAKE_PATH=/app/datalake
      - CRAWLER_ID=1
      - NUM_CRAWLERS=3
      - PORT=7008
    ports:
      - "7008:7008"
    volumes:
      - ./datalake:/app/datalake
    depends_on:
      activemq:
        condition: service_healthy
    networks:
      - search_net

  crawler-2:
    build:
      context: ./crawler-service
    container_name: crawler-2
    environment:
      - BROKER_URL=tcp://activemq:61616
      - INGESTION_QUEUE=document.ingested
      - DATALAKE_PATH=/app/datalake
      - CRAWLER_ID=2
      - NUM_CRAWLERS=3
      - PORT=7009
    ports:
      - "7009:7009"
    volumes:
      - ./datalake:/app/datalake
    depends_on:
      activemq:
        condition: service_healthy
    networks:
      - search_net

  # ══════════════════════════════════════════════════════════════════════
  # CONTROL MODULE
  # ══════════════════════════════════════════════════════════════════════

  control-service:
    build:
      context: ./control-module
      dockerfile: Dockerfile
    container_name: control-service
    environment:
      - PORT=7006
      - INGESTION_URL=http://ingestion-0:7001
      - INDEXING_URL=http://indexing-service:7002
      - SEARCH_URL=http://nginx
      - CRAWLER_URL=http://crawler-0:7007
      - BROKER_URL=tcp://activemq:61616
      - REINDEX_TOPIC=reindex.request
    ports:
      - "7006:7006"
    depends_on:
      - ingestion-0
      - indexing-service
      - search-1
      - nginx
      - activemq
    networks:
      - search_net

  # ══════════════════════════════════════════════════════════════════════
  # BENCHMARK SERVICES
  # ══════════════════════════════════════════════════════════════════════

  benchmarks:
    build:
      context: ./benchmarks
      dockerfile: Dockerfile
    container_name: benchmarks
    environment:
      - PORT=7004
      - INGESTION_URL=http://ingestion-0:7001
      - INDEXING_URL=http://indexing-service:7002
      - SEARCH_URL=http://nginx
      - MONGO_URI=mongodb://mongo:27017
      - MONGO_DB=searchengine
      - MONGO_COLLECTION=books
    ports:
      - "7004:7004"
    depends_on:
      - search-1
      - hazelcast-1
      - hazelcast-2
      - hazelcast-3
      - mongo
    networks:
      - search_net

  microbenchmarks:
    build:
      context: ./microbenchmarks
      dockerfile: Dockerfile
    container_name: microbenchmarks
    environment:
      - PORT=7005
      - SEARCH_URL=http://nginx
      - MONGO_URI=mongodb://mongo:27017
      - MONGO_DB=searchengine
      - MONGO_COLLECTION=books
    ports:
      - "7005:7005"
    depends_on:
      - search-1
      - hazelcast-1
      - mongo
    networks:
      - search_net

networks:
  search_net:
    driver: bridge